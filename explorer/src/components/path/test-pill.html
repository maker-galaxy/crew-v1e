<html>
  <style>
:root{
  --pill-h: 56px;
  --pill-r: 9999px;
  --pill-pad-x: 22px;

  --pill-text: rgba(255,255,255,0.92);
  --pill-text-shadow: 0 1px 1px rgba(0,0,0,0.55);

  --pill-shadow:
    0 10px 22px rgba(0,0,0,0.45),
    0 2px 0 rgba(255,255,255,0.10) inset,
    0 -10px 20px rgba(0,0,0,0.35) inset;

  --pill-shadow-hover:
    0 14px 28px rgba(0,0,0,0.55),
    0 2px 0 rgba(255,255,255,0.12) inset,
    0 -12px 22px rgba(0,0,0,0.38) inset;
}

.matrix-pill-row{
  display:flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items:center;
}

.matrix-pill{
  position: relative;
  height: var(--pill-h);
  padding: 0 var(--pill-pad-x);
  border-radius: var(--pill-r);
  border: 1px solid rgba(255,255,255,0.16);
  color: var(--pill-text);
  text-shadow: var(--pill-text-shadow);
  font: 600 15px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  letter-spacing: 0.3px;

  box-shadow: var(--pill-shadow);
  transform: translateZ(0);
  transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;

  /* Important: avoid “cheap AI” gradients by keeping it subtle */
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.10),
    rgba(255,255,255,0.02) 35%,
    rgba(0,0,0,0.18)
  );
}

.matrix-pill__label{
  position: relative;
  z-index: 3;
  white-space: nowrap;
}

.matrix-pill::before{
  /* glossy specular highlight */
  content:"";
  position:absolute;
  left: 10px;
  right: 10px;
  top: 7px;
  height: 38%;
  border-radius: var(--pill-r);
  background: linear-gradient(to bottom,
    rgba(255,255,255,0.38),
    rgba(255,255,255,0.08)
  );
  filter: blur(0.2px);
  opacity: 0.8;
  z-index: 1;
  pointer-events:none;
}

.matrix-pill::after{
  /* seam / split line */
  content:"";
  position:absolute;
  top: 10px;
  bottom: 10px;
  left: 50%;
  width: 1px;
  transform: translateX(-0.5px);
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.00),
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.00)
  );
  opacity: 0.55;
  z-index: 2;
  pointer-events:none;
}

.matrix-pill:hover{
  transform: translateY(-1px) scale(1.01);
  box-shadow: var(--pill-shadow-hover);
}

.matrix-pill:active{
  transform: translateY(1px) scale(0.995);
  filter: brightness(0.98);
}

.matrix-pill--red{
  /* red gel undercoat */
  background:
    radial-gradient(120% 140% at 30% 20%, rgba(255,255,255,0.10), rgba(255,255,255,0) 45%),
    linear-gradient(to right, rgba(255,45,45,0.95), rgba(160,0,0,0.95));
}

.matrix-pill--blue{
  background:
    radial-gradient(120% 140% at 30% 20%, rgba(255,255,255,0.10), rgba(255,255,255,0) 45%),
    linear-gradient(to right, rgba(40,130,255,0.95), rgba(0,60,170,0.95));
}

.matrix-pill--neutral{
  opacity: 0.92;
  background:
    radial-gradient(120% 140% at 30% 20%, rgba(255,255,255,0.09), rgba(255,255,255,0) 45%),
    linear-gradient(to right, rgba(45,45,45,0.95), rgba(10,10,10,0.95));
}


/* --- Matrix palette pills --- */

.matrix-pill--diy-red{
  background:
    radial-gradient(120% 140% at 30% 20%, rgba(255,255,255,0.12), rgba(255,255,255,0) 45%),
    linear-gradient(to right,
      rgba(255, 64, 64, 0.96),
      rgba(170,  0,  0, 0.96)
    );
}

.matrix-pill--kits-purple{
  /* Intentional blend: magenta/purple with subtle blue depth */
  background:
    radial-gradient(120% 140% at 30% 20%, rgba(255,255,255,0.12), rgba(255,255,255,0) 45%),
    linear-gradient(to right,
      rgba(196,  64, 255, 0.96),
      rgba( 96,  32, 190, 0.96)
    );
}

.matrix-pill--built-blue{
  background:
    radial-gradient(120% 140% at 30% 20%, rgba(255,255,255,0.12), rgba(255,255,255,0) 45%),
    linear-gradient(to right,
      rgba( 64, 160, 255, 0.96),
      rgba(  0,  72, 190, 0.96)
    );
}

/* Optional: tiny hue-specific glow on hover only (keeps it from feeling “cheap AI”) */
.matrix-pill--diy-red:hover{ filter: drop-shadow(0 0 10px rgba(255,40,40,0.22)); }
.matrix-pill--kits-purple:hover{ filter: drop-shadow(0 0 10px rgba(190,90,255,0.22)); }
.matrix-pill--built-blue:hover{ filter: drop-shadow(0 0 10px rgba(60,140,255,0.22)); }



  </style>
  <body>
    <h1>Path Pill Test</h1>
    <div class="pill">
      <a href="../diy/index.html">DIY</a>
    </div>

    <div class="matrix-pill-row">
      <button class="matrix-pill matrix-pill--red">
        <span class="matrix-pill__label">Build it yourself</span>
      </button>

      <button class="matrix-pill matrix-pill--blue">
        <span class="matrix-pill__label">Get a kit</span>
      </button>

      <button class="matrix-pill matrix-pill--neutral">
        <span class="matrix-pill__label">Buy it built</span>
      </button>


<button class="matrix-pill matrix-pill--diy-red"><span class="matrix-pill__label">Build it yourself</span></button>
<button class="matrix-pill matrix-pill--kits-purple"><span class="matrix-pill__label">Get a kit</span></button>
<button class="matrix-pill matrix-pill--built-blue"><span class="matrix-pill__label">Buy it built</span></button>      
    </div>
</html>
