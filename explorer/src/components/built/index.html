  <script src="../../static/vendor/qrcodejs/qrcode.js"></script>
  <script src="../../js/mge-browse-or-qr-infra.js"></script>
  <script>
    // ===========================
    // CONFIG (grouped for tuning)
    // ===========================

    const CONFIG = {
      PRODUCTS_JSON_URL: "./products.json",

      // If PRODUCTS is null, we render the fallback placeholders below.
      FALLBACK_PRODUCTS: [
        {
          title: "V1 Engineering LR4 Fully Built CNC Deluxe Version",
          priceText: "From $1,499.99",
          productUrl: "#",
          primaryImageUrl: "",
          hoverImageUrl: ""
        },
        {
          title: "V1 Engineering LR4 Fully Built CNC",
          priceText: "From $1,149.99",
          productUrl: "#",
          primaryImageUrl: "",
          hoverImageUrl: ""
        },
        {
          title: "Partially Assembled V1 Engineering LR4 CNC Machine",
          priceText: "From $899.99",
          productUrl: "#",
          primaryImageUrl: "",
          hoverImageUrl: ""
        },
        {
          title: "LR4 PET-CF Printed Part Set",
          priceText: "From $249.99",
          productUrl: "#",
          primaryImageUrl: "",
          hoverImageUrl: ""
        }
      ]
    };

    // ===========================
    // Helpers
    // ===========================

    function normalizePriceText(raw) {
      if (!raw) return "";
      // Your extracted priceText can include "Regular price ... Sale price ..."
      // Prefer "From $X" if present; else pick first $amount.
      const fromMatch = raw.match(/From\s+\$[\d,]+(\.\d{2})?/i);
      if (fromMatch) return fromMatch[0];

      const money = raw.match(/\$[\d,]+(\.\d{2})?/);
      return money ? money[0] : raw.replace(/\s+/g, " ").trim();
    }

    function el(tag, className, text) {
      const n = document.createElement(tag);
      if (className) n.className = className;
      if (text != null) n.textContent = text;
      return n;
    }

    async function loadProducts() {
      try {
        const res = await fetch(CONFIG.PRODUCTS_JSON_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (data && Array.isArray(data.items) && data.items.length) {
          return data.items;
        }
      } catch (err) {
        console.warn("built.section.products: failed to load products.json, using fallback", err);
      }

      return CONFIG.FALLBACK_PRODUCTS;
    }

    function buildProductCard(p) {
      const card = el("article", "card");

      const media = el("div", "card__media");
      const img = document.createElement("img");
      img.alt = p.title || "";
      img.loading = "lazy";
      img.decoding = "async";
      img.referrerPolicy = "no-referrer";

      if (p.primaryImageUrl) {
        img.src = p.primaryImageUrl;
      } else {
        // If no image, keep it blank but still reserve layout space.
        img.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";
      }

      // Simple hover swap if hover image exists
      if (p.hoverImageUrl) {
        img.addEventListener("mouseenter", () => img.src = p.hoverImageUrl);
        img.addEventListener("mouseleave", () => img.src = p.primaryImageUrl);
        img.addEventListener("touchstart", () => img.src = p.hoverImageUrl, { passive: true });
        img.addEventListener("touchend", () => img.src = p.primaryImageUrl, { passive: true });
      }

      media.appendChild(img);

      const body = el("div", "card__body");
      const title = el("h3", "card__title", p.title || "Untitled");
      const price = el("p", "card__price");
      const priceLabel = el("span", "", ""); // reserved (you can use for "From")
      const priceText = document.createTextNode(normalizePriceText(p.priceText));
      price.appendChild(priceLabel);
      price.appendChild(priceText);

      const ctaWrap = el("div", "card__cta");
      const btn = document.createElement("a");
      btn.className = "button";
      btn.href = p.productUrl || "#";
      btn.target = "_blank";
      btn.rel = "noopener noreferrer";
      btn.textContent = "Choose options";
      btn.addEventListener("click", (event) => {
        event.preventDefault();
        if (typeof addTrace === "function") {
          addTrace("info", `BUILT_CTA click href=${btn.href}`);
        }
        browse_or_qr(btn.href, { target: "_blank" });
      });

      ctaWrap.appendChild(btn);

      body.appendChild(title);
      body.appendChild(price);
      body.appendChild(ctaWrap);

      card.appendChild(media);
      card.appendChild(body);
      return card;
    }

    function bindPartnerCardsBrowseOrQr() {
      const partnerCards = document.querySelectorAll(".partner-card");
      partnerCards.forEach((card) => {
        card.addEventListener("click", (event) => {
          event.preventDefault();
          const href = card.getAttribute("href") || "#";
          const target = card.getAttribute("target") || "_self";
          if (typeof addTrace === "function") {
            addTrace("info", `BUILT_PARTNER click href=${href} target=${target}`);
          }
          browse_or_qr(href, { target });
        });
      });
    }

    // ===========================
    // Render
    // ===========================

    function applyMode() {
      const params = new URLSearchParams(window.location.search);
      const mode = (params.get("mode") || "0").trim();
      const pageRoot = document.getElementById("pageRoot");
      const embedMode = mode === "1" || params.get("embedded") === "1";
      const noAtmosphere = params.get("atmosphere") === "0" || mode === "2";

      if (embedMode) {
        pageRoot.classList.add("mode-embed");
      }
      if (noAtmosphere) {
        pageRoot.classList.add("mode-no-atmosphere");
      }

      console.log(`built.section.mode mode=${mode} embed=${embedMode} noAtmosphere=${noAtmosphere}`);
    }

    (async function init() {
      applyMode();
      bindPartnerCardsBrowseOrQr();
      const grid = document.getElementById("grid");
      const products = await loadProducts();

      for (const p of products) {
        grid.appendChild(buildProductCard(p));
      }

      document.getElementById("countText").textContent = `${products.length} products`;
    })();
  </script>
