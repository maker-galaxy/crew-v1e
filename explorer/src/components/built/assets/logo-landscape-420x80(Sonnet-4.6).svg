<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="420" height="80" fill="#f4f4f2"/>

  <!-- ===================================== -->
  <!-- FAINT BACKDROP SILHOUETTE TREES       -->
  <!-- ===================================== -->

  <!-- Large backdrop tree, right side, partially cropped -->
  <g opacity="0.08" fill="#2d7015">
    <polygon points="392,-18 369,23 377,23 354,52 363,52 339,83 445,83 421,52 430,52 407,23 415,23"/>
  </g>
  <!-- Small backdrop tree, left-bleed -->
  <g opacity="0.08" fill="#2d7015">
    <polygon points="4,-10 -12,22 -5,22 -19,46 -12,46 -27,72 38,72 23,46 30,46 16,22 23,22"/>
  </g>

  <!-- ===================================== -->
  <!-- THREE MAIN PINE TREES                 -->
  <!-- ===================================== -->

  <!-- LEFT TREE  cx=16, shorter -->
  <g fill="#2a6b0d">
    <polygon points="16,14 12,25  20,25"/>
    <polygon points="16,20  7,35  25,35"/>
    <polygon points="16,28  4,47  28,47"/>
    <polygon points="16,37  2,56  30,56"/>
    <rect x="13.5" y="56" width="5" height="8" rx="1" fill="#6e3318"/>
  </g>
  <g stroke="rgba(255,255,255,0.5)" stroke-width="1.1" fill="none" stroke-linecap="round">
    <line x1="16"  y1="23" x2="12.5" y2="31"/>
    <line x1="9"   y1="41" x2="6"    y2="50"/>
  </g>

  <!-- CENTER TREE  cx=42, tallest -->
  <g fill="#2a6b0d">
    <polygon points="42, 4  38,17  46,17"/>
    <polygon points="42,11  33,28  51,28"/>
    <polygon points="42,21  28,42  56,42"/>
    <polygon points="42,33  25,57  59,57"/>
    <rect x="39.5" y="57" width="5" height="8" rx="1" fill="#6e3318"/>
  </g>
  <g stroke="rgba(255,255,255,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round">
    <line x1="42"  y1="15" x2="38"  y2="24"/>
    <line x1="35"  y1="34" x2="30.5" y2="43"/>
    <line x1="49"  y1="28" x2="53"  y2="39"/>
  </g>

  <!-- RIGHT TREE  cx=68, shorter -->
  <g fill="#2a6b0d">
    <polygon points="68,14  64,25  72,25"/>
    <polygon points="68,20  59,35  77,35"/>
    <polygon points="68,28  56,47  80,47"/>
    <polygon points="68,37  54,56  82,56"/>
    <rect x="65.5" y="56" width="5" height="8" rx="1" fill="#6e3318"/>
  </g>
  <g stroke="rgba(255,255,255,0.5)" stroke-width="1.1" fill="none" stroke-linecap="round">
    <line x1="68"  y1="23" x2="71.5" y2="31"/>
    <line x1="75"  y1="41" x2="78"   y2="50"/>
  </g>

  <!-- ===================================== -->
  <!-- TEXT — right of trees                 -->
  <!-- ===================================== -->

  <!-- "NORTH WOODS" — dark green, condensed black -->
  <text
    x="94"
    y="51"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="900"
    font-size="41"
    fill="#1d5e13"
    letter-spacing="-0.5"
  >NORTH WOODS</text>

  <!-- "CUSTOM CREATIONS" — lighter green, tracked wide to match width above -->
  <text
    x="96"
    y="66"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="500"
    font-size="11.5"
    fill="#6baa1e"
    textLength="235"
    lengthAdjust="spacing"
  >CUSTOM CREATIONS</text>

</svg>
